<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>To_AgCu</title>
  <style>
    :root {
      --bg-1: #fff8fc;
      --bg-2: #fdeff5;
      --bg-3: #f9e1ea;
      --text: #7b5b69;
      --text-soft: rgba(123, 91, 105, 0.72);
      --accent-deep: #be6f91;
      --safe-top: max(env(safe-area-inset-top), 12px);
      --safe-bottom: max(env(safe-area-inset-bottom), 12px);
      --page-pad-x: clamp(22px, 6vw, 58px);
      --page-pad-y: clamp(22px, 5vw, 44px);
      --nav-size: 26px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.92), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(255,255,255,0.7), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.45), transparent 34%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(24px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.2;
      animation: breathe 9s ease-in-out infinite;
    }

    body::before {
      width: 34vmax;
      height: 34vmax;
      top: -9vmax;
      right: -8vmax;
      background: rgba(255, 214, 231, 0.9);
    }

    body::after {
      width: 38vmax;
      height: 38vmax;
      bottom: -12vmax;
      left: -12vmax;
      background: rgba(248, 197, 218, 0.72);
      animation-delay: -4.5s;
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.06); }
    }

    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      color: rgba(190, 111, 145, 0.9);
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 30;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.22s ease, opacity 0.22s ease, color 0.22s ease;
      text-shadow: 0 4px 18px rgba(214, 140, 171, 0.35);
    }

    .nav-btn:hover {
      transform: translateY(-50%) scale(1.08);
      color: rgba(190, 111, 145, 1);
    }

    .nav-btn:active { transform: translateY(-50%) scale(0.95); }
    .nav-btn:disabled { opacity: 0.24; cursor: not-allowed; }
    .nav-btn.left { left: max(10px, env(safe-area-inset-left)); }
    .nav-btn.right { right: max(10px, env(safe-area-inset-right)); }

    .nav-btn svg {
      width: var(--nav-size);
      height: var(--nav-size);
      stroke-width: 2.15;
      fill: none;
      overflow: visible;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100dvh;
      padding: calc(var(--page-pad-y) + var(--safe-top)) var(--page-pad-x) calc(var(--page-pad-y) + var(--safe-bottom));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage-shell {
      position: relative;
      width: min(1120px, 100%);
      min-height: min(84dvh, 820px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px) scale(0.992);
      transition: opacity 0.55s ease, transform 0.55s ease;
      padding: 4vh 1vw;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .message-stage {
      position: relative;
      width: min(920px, 100%);
      min-height: clamp(460px, 74vh, 700px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .poem-wrap {
      position: relative;
      width: 100%;
      height: clamp(430px, 62vh, 610px);
      flex: 0 0 auto;
    }

    .poem-line {
      position: absolute;
      left: 0;
      width: min(92%, 900px);
      max-width: min(92%, 900px);
      min-height: clamp(126px, 17vh, 170px);
      padding-right: 8px;
      font-size: clamp(24px, 3.75vw, 44px);
      line-height: 1.62;
      letter-spacing: 0.018em;
      color: rgba(123, 91, 105, 0.96);
      text-wrap: pretty;
      word-break: break-word;
      filter: drop-shadow(0 8px 26px rgba(214, 140, 171, 0.08));
      transform-origin: left center;
    }

    .poem-line.slot-0 { top: 2%; }
    .poem-line.slot-1 { top: 36%; }
    .poem-line.slot-2 { top: 70%; }

    .poem-line.indent-0 { margin-left: 0; }
    .poem-line.indent-1 { margin-left: clamp(16px, 5vw, 64px); }
    .poem-line.indent-2 { margin-left: clamp(32px, 9vw, 120px); }
    .poem-line.indent-3 { margin-left: clamp(18px, 7vw, 86px); }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px) rotate(var(--r, 0deg)) scale(0.98);
      filter: blur(4px);
      transform-origin: center;
      animation: charBloom 0.74s cubic-bezier(.18,.84,.26,1) forwards;
      transition:
        opacity var(--fade-dur, 720ms) ease var(--fade-delay, 0ms),
        transform var(--fade-dur, 720ms) ease var(--fade-delay, 0ms),
        filter var(--fade-dur, 720ms) ease var(--fade-delay, 0ms);
      will-change: transform, opacity, filter;
    }

    @keyframes charBloom {
      to {
        opacity: 1;
        transform: translateY(0) rotate(var(--r, 0deg)) scale(1);
        filter: blur(0);
      }
    }

    .char.page-fade {
      opacity: 0;
      filter: blur(4px);
      transform:
        translate(var(--fade-x, 0px), var(--fade-y, -10px))
        rotate(calc(var(--r, 0deg) + var(--fade-rot, 0deg)))
        scale(0.96);
    }

    .choice-wrap {
      width: min(440px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: clamp(28px, 5vh, 40px);
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
      transition: opacity 0.52s ease, transform 0.52s ease;
      align-self: center;
      position: relative;
      z-index: 10;
    }

    .choice-wrap.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .page.final-page .message-stage {
      min-height: min(76dvh, 640px);
      justify-content: flex-start;
      padding-top: clamp(12px, 3vh, 24px);
    }

    .page.final-page .poem-wrap {
      height: clamp(270px, 40vh, 360px);
    }

    .page.final-page .poem-line {
      min-height: clamp(86px, 11vh, 118px);
    }

    .page.final-page .poem-line.slot-0 { top: 0%; }
    .page.final-page .poem-line.slot-1 { top: 30%; }
    .page.final-page .poem-line.slot-2 { top: 60%; }

    .page.final-page .choice-wrap {
      margin-top: clamp(10px, 2.8vh, 20px);
    }

    .choice-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      min-height: 52px;
      padding: 14px 18px;
      font-size: clamp(16px, 2.1vw, 18px);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn.primary {
      background: linear-gradient(135deg, #e8a7c1, #d78baa);
      color: #fff;
      box-shadow: 0 12px 28px rgba(215, 139, 170, 0.28);
    }

    .choice-btn.secondary {
      background: rgba(255, 255, 255, 0.72);
      color: #886977;
      box-shadow: 0 8px 22px rgba(160, 110, 132, 0.1);
      border: 1px solid rgba(214, 140, 171, 0.12);
    }

    .choice-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(215, 139, 170, 0.24);
    }

    .choice-btn:active { transform: scale(0.97); }

    .status-text {
      min-height: 24px;
      margin-top: 12px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: var(--text-soft);
      align-self: center;
      position: relative;
      z-index: 10;
    }

    .petal {
      position: absolute;
      width: 14px;
      height: 22px;
      border-radius: 70% 70% 70% 12%;
      background: linear-gradient(180deg, rgba(255, 217, 230, 0.66), rgba(230, 155, 185, 0.34));
      filter: blur(0.2px);
      transform: rotate(var(--rot, 0deg));
      opacity: 0;
      pointer-events: none;
      animation: petalFloat linear forwards;
      z-index: 0;
    }

    @keyframes petalFloat {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)) scale(0.82);
      }
      12% { opacity: 0.9; }
      100% {
        opacity: 0;
        transform: translate3d(var(--drift-x, 0px), var(--drift-y, 240px), 0) rotate(calc(var(--rot, 0deg) + 90deg)) scale(1.18);
      }
    }

    @media (max-width: 760px) {
      :root { --nav-size: 24px; }

      .nav-btn.left { left: max(4px, env(safe-area-inset-left)); }
      .nav-btn.right { right: max(4px, env(safe-area-inset-right)); }

      .stage-shell { min-height: 88dvh; }

      .message-stage {
        min-height: clamp(430px, 72vh, 620px);
      }

      .poem-wrap {
        height: clamp(360px, 50vh, 440px);
      }

      .poem-line {
        font-size: clamp(20px, 5.8vw, 30px);
        line-height: 1.68;
        width: min(94%, calc(100% - 4px));
        max-width: min(94%, calc(100% - 4px));
        min-height: clamp(102px, 13vh, 136px);
        letter-spacing: 0.018em;
      }

      .poem-line.slot-0 { top: 2%; }
      .poem-line.slot-1 { top: 33%; }
      .poem-line.slot-2 { top: 64%; }

      .page.final-page .message-stage {
        min-height: 100%;
        justify-content: flex-start;
        padding-top: max(4vh, 18px);
      }

      .page.final-page .poem-wrap {
        height: clamp(230px, 34vh, 300px);
      }

      .page.final-page .poem-line {
        min-height: clamp(64px, 8vh, 92px);
      }

      .page.final-page .poem-line.slot-0 { top: 0%; }
      .page.final-page .poem-line.slot-1 { top: 31%; }
      .page.final-page .poem-line.slot-2 { top: 62%; }

      .poem-line.indent-1 { margin-left: clamp(10px, 4vw, 24px); }
      .poem-line.indent-2 { margin-left: clamp(18px, 7vw, 42px); }
      .poem-line.indent-3 { margin-left: clamp(12px, 6vw, 32px); }

      .choice-wrap {
        width: min(320px, 100%);
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 12px;
      }

      .page.final-page .choice-wrap {
        margin-top: 6px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <button class="nav-btn left" id="prevBtn" aria-label="上一页">
    <svg viewBox="0 0 24 24" stroke="currentColor">
      <path d="M15 18L9 12L15 6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <button class="nav-btn right" id="nextBtn" aria-label="下一页">
    <svg viewBox="0 0 24 24" stroke="currentColor">
      <path d="M9 18L15 12L9 6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="app">
    <main class="stage-shell" id="stageShell"></main>
  </div>

  <script>
    const CONFIG = {
      autoPlay: true,
      lineHoldMs: 1500,
      lineAppearGap: 80,
      pageFadeDurationMs: 760,
      pageGapMs: 2000,
      petalIntervalMs: 1500,
      NOTIFY_ENDPOINT: "https://message.1563943900.workers.dev/",
      pageData: [
        {
          lines: [
            "2020年，我就已经喜欢上你了。",
            "高三分班以后，我开始想办法靠近你。",
            "那时候的我不太懂得怎么表达喜欢，现在想想，好像直到今天，我还是不擅长浪漫。"
          ]
        },
        {
          lines: [
            "曾经我对你的喜欢是热烈的。",
            "我喜欢你的性格，喜欢和你有关的许多细节。",
            "时间过去了很久，它带走了一些冲动，却没有带走这份喜欢。如今留下来的，更像是一种平静而认真的在意。"
          ]
        },
        {
          lines: [
            "你像一束不喧哗的光，不必特别耀眼。",
            "也已经让周围的一切慢慢柔软下来。",
            "很多原本平常的日子，只要想到你，也会多一点亮度。"
          ]
        },
        {
          lines: [
            "你的很多话、很多举动，都会在不知不觉间牵动我的情绪。",
            "即使相隔很远，我也还是会常常想起你。",
            "那种想念并不喧闹，却一直都在。"
          ]
        },
        {
          lines: [
            "我想，我已经认真地等待了很久。",
            "接下来的日子里，如果可以，",
            "我希望自己能站到离你更近一点的位置，也更自然地参与到你的生活里。"
          ]
        },
        {
          lines: [
            "所以，我想认真地再问你一次：",
            "你愿意做我女朋友，",
            "一起继续向前吗？"
          ],
          isFinal: true
        }
      ]
    };

    const state = {
      currentPage: 0,
      pageToken: 0,
      petalTimer: null,
      lastChoice: null
    };

    const stageShell = document.getElementById('stageShell');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function updateNavState() {
      prevBtn.disabled = state.currentPage === 0;
      nextBtn.disabled = state.currentPage === CONFIG.pageData.length - 1;
    }

    function buildPages() {
      stageShell.innerHTML = '';
      CONFIG.pageData.forEach((page, index) => {
        const pageEl = document.createElement('section');
        pageEl.className = `page ${index === state.currentPage ? 'active' : ''} ${page.isFinal ? 'final-page' : ''}`;
        pageEl.dataset.index = String(index);

        const linesHtml = (page.lines || [])
          .slice(0, 3)
          .map((_, i) => `<div class="poem-line slot-${i} indent-${i % 4}" data-line-index="${i}"></div>`)
          .join('');

        pageEl.innerHTML = `
          <div class="message-stage">
            <div class="poem-wrap count-3" data-poem-wrap>${linesHtml}</div>
            ${page.isFinal ? `
              <div class="choice-wrap" data-choice-wrap>
                <button class="choice-btn primary" data-choice="愿意">愿意</button>
                <button class="choice-btn secondary" data-choice="不愿意">不愿意</button>
              </div>
              <div class="status-text" data-status></div>
            ` : ''}
          </div>
        `;

        stageShell.appendChild(pageEl);
      });
    }

    function getPageEl(index = state.currentPage) {
      return stageShell.querySelector(`.page[data-index="${index}"]`);
    }

    function setActivePage(index) {
      stageShell.querySelectorAll('.page').forEach((pageEl, idx) => {
        pageEl.classList.toggle('active', idx === index);
      });
      updateNavState();
    }

    function createCharSpan(char) {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = char;
      span.style.setProperty('--r', `${randomBetween(-7, 7).toFixed(2)}deg`);
      span.style.animationDelay = `${randomBetween(30, 300)}ms`;
      return span;
    }

    async function showLine(lineEl, text, token) {
      if (!lineEl || token !== state.pageToken) return;
      lineEl.innerHTML = '';
      [...text].forEach((char) => {
        lineEl.appendChild(createCharSpan(char));
      });
      await wait(760 + text.length * 28);
    }

    async function dissolveWholePage(pageEl, token) {
      if (!pageEl || token !== state.pageToken) return;
      const chars = [...pageEl.querySelectorAll('.poem-line .char')];
      if (!chars.length) return;

      chars.forEach((char, index) => {
        char.style.setProperty('--fade-x', `${randomBetween(-8, 8).toFixed(2)}px`);
        char.style.setProperty('--fade-y', `${randomBetween(-12, 6).toFixed(2)}px`);
        char.style.setProperty('--fade-rot', `${randomBetween(-8, 8).toFixed(2)}deg`);
        char.style.setProperty('--fade-dur', `${randomBetween(CONFIG.pageFadeDurationMs - 90, CONFIG.pageFadeDurationMs + 50).toFixed(0)}ms`);
        char.style.setProperty('--fade-delay', `${(index % 10) * 14}ms`);
      });

      await new Promise((resolve) => {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            chars.forEach((char) => char.classList.add('page-fade'));
            resolve();
          });
        });
      });

      await wait(CONFIG.pageFadeDurationMs + 260);
      if (token !== state.pageToken) return;
      pageEl.querySelectorAll('.poem-line').forEach((line) => { line.innerHTML = ''; });
    }

    async function playPage(index) {
      const token = ++state.pageToken;
      const page = CONFIG.pageData[index];
      const pageEl = getPageEl(index);
      if (!pageEl) return;

      const lineEls = [...pageEl.querySelectorAll('.poem-line')];
      const choiceWrap = pageEl.querySelector('[data-choice-wrap]');
      const statusEl = pageEl.querySelector('[data-status]');

      lineEls.forEach((el) => { el.innerHTML = ''; });
      if (choiceWrap) choiceWrap.classList.remove('show');
      if (statusEl) statusEl.textContent = '';

      for (let i = 0; i < (page.lines || []).length; i++) {
        if (token !== state.pageToken) return;
        await showLine(lineEls[i], page.lines[i], token);
        if (token !== state.pageToken) return;
        await wait(CONFIG.lineHoldMs);
        if (token !== state.pageToken) return;
        if (i < page.lines.length - 1) {
          await wait(CONFIG.lineAppearGap);
        }
      }

      if (page.isFinal) {
        if (choiceWrap) choiceWrap.classList.add('show');
        return;
      }

      await wait(CONFIG.pageGapMs);
      if (token !== state.pageToken) return;

      await dissolveWholePage(pageEl, token);
      if (token !== state.pageToken) return;

      if (CONFIG.autoPlay && token === state.pageToken && state.currentPage < CONFIG.pageData.length - 1) {
        goToPage(state.currentPage + 1);
      }
    }

    function goToPage(index) {
      state.currentPage = Math.max(0, Math.min(CONFIG.pageData.length - 1, index));
      state.pageToken += 1;
      setActivePage(state.currentPage);
      playPage(state.currentPage);
    }

        async function postChoicePayload(payload) {
      const response = await fetch(CONFIG.NOTIFY_ENDPOINT, {
        method: 'POST',
        mode: 'cors',
        cache: 'no-store',
        keepalive: true,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const result = await response.text();
      console.log('Worker response:', response.status, result);

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${result}`);
      }

      return true;
    }

    function beaconChoicePayload(payload) {
      if (!navigator.sendBeacon) return false;
      const blob = new Blob([JSON.stringify(payload)], {
        type: 'text/plain;charset=UTF-8'
      });
      return navigator.sendBeacon(CONFIG.NOTIFY_ENDPOINT, blob);
    }

    async function notifyChoice(choice) {
      const pageEl = getPageEl(state.currentPage);
      const statusEl = pageEl?.querySelector('[data-status]');
      if (!statusEl) return;
    
      statusEl.textContent = '正在把你的答案送出去…给我最后5秒…';
    
      if (!CONFIG.NOTIFY_ENDPOINT) {
        statusEl.textContent = `你点击了“${choice}”。当前还没填通知接口地址，所以暂时只在页面里记录结果。`;
        console.log('[Choice captured locally]', choice);
        state.lastChoice = choice;
        return;
      }
    
      const payload = {
        choice,
        pageTitle: document.title,
        time: new Date().toISOString(),
        userAgent: navigator.userAgent || 'unknown',
        lang: navigator.language || 'unknown',
        screen: `${window.screen.width}x${window.screen.height}`,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown'
      };
    
      try {
        // 先走正常 POST
        const response = await fetch(CONFIG.NOTIFY_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
          keepalive: true,
          mode: 'cors',
          cache: 'no-store'
        });
    
        const text = await response.text();
        console.log('Worker response:', response.status, text);
    
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${text}`);
        }
    
        statusEl.textContent = `已收到，你的选择是“${choice}”。`;
        state.lastChoice = choice;
        return;
      } catch (postError) {
        console.warn('POST failed, try GET fallback:', postError);
    
        try {
          // 手机端兜底：走 GET fallback，避免某些移动端对 POST JSON 不稳定
          const url = new URL(CONFIG.NOTIFY_ENDPOINT);
          url.searchParams.set('choice', payload.choice);
          url.searchParams.set('pageTitle', payload.pageTitle);
          url.searchParams.set('time', payload.time);
          url.searchParams.set('userAgent', payload.userAgent);
          url.searchParams.set('lang', payload.lang);
          url.searchParams.set('screen', payload.screen);
          url.searchParams.set('timezone', payload.timezone);
          url.searchParams.set('transport', 'get-fallback');
    
          const fallbackResp = await fetch(url.toString(), {
            method: 'GET',
            mode: 'cors',
            cache: 'no-store'
          });
    
          const fallbackText = await fallbackResp.text();
          console.log('Worker fallback response:', fallbackResp.status, fallbackText);
    
          if (!fallbackResp.ok) {
            throw new Error(`Fallback HTTP ${fallbackResp.status}: ${fallbackText}`);
          }
    
          statusEl.textContent = `已收到，你的选择是“${choice}”。`;
          state.lastChoice = choice;
          return;
        } catch (fallbackError) {
          console.error(fallbackError);
          statusEl.textContent = `选择已记录为“${choice}”，但通知发送失败了。请检查外部接口是否可用。`;
          state.lastChoice = choice;
        }
      }
    }

    function spawnPetal() {
      const petal = document.createElement('span');
      petal.className = 'petal';
      petal.style.left = `${randomBetween(6, 94)}%`;
      petal.style.top = `${randomBetween(-10, 24)}%`;
      petal.style.setProperty('--rot', `${randomBetween(-30, 30)}deg`);
      petal.style.setProperty('--drift-x', `${randomBetween(-80, 80)}px`);
      petal.style.setProperty('--drift-y', `${randomBetween(240, 420)}px`);
      petal.style.animationDuration = `${randomBetween(5.6, 8.2)}s`;
      stageShell.appendChild(petal);
      petal.addEventListener('animationend', () => petal.remove(), { once: true });
    }

    function startPetals() {
      stopPetals();
      spawnPetal();
      state.petalTimer = setInterval(spawnPetal, CONFIG.petalIntervalMs);
    }

    function stopPetals() {
      if (state.petalTimer) {
        clearInterval(state.petalTimer);
        state.petalTimer = null;
      }
      stageShell.querySelectorAll('.petal').forEach(el => el.remove());
    }

    function bindEvents() {
      prevBtn.addEventListener('click', () => {
        if (state.currentPage > 0) goToPage(state.currentPage - 1);
      });

      nextBtn.addEventListener('click', () => {
        if (state.currentPage < CONFIG.pageData.length - 1) goToPage(state.currentPage + 1);
      });

      stageShell.addEventListener('click', (event) => {
        const btn = event.target.closest('[data-choice]');
        if (!btn) return;
        notifyChoice(btn.getAttribute('data-choice'));
      });

      let touchStartX = 0;
      let touchStartY = 0;

      stageShell.addEventListener('touchstart', (e) => {
        const touch = e.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      stageShell.addEventListener('touchend', (e) => {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        if (Math.abs(dx) < 44 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0 && state.currentPage < CONFIG.pageData.length - 1) {
          goToPage(state.currentPage + 1);
        } else if (dx > 0 && state.currentPage > 0) {
          goToPage(state.currentPage - 1);
        }
      }, { passive: true });

      window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft' && state.currentPage > 0) goToPage(state.currentPage - 1);
        if (e.key === 'ArrowRight' && state.currentPage < CONFIG.pageData.length - 1) goToPage(state.currentPage + 1);
      });
    }

    function init() {
      buildPages();
      bindEvents();
      startPetals();
      updateNavState();
      goToPage(0);
    }

    init();
  </script>
</body>
</html>
