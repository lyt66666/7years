<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>你猜这是啥</title>
  <style>
    :root {
      --bg-1: #fff8fc;
      --bg-2: #fdeff5;
      --bg-3: #f9e1ea;
      --text: #7b5b69;
      --text-soft: rgba(123, 91, 105, 0.72);
      --accent: #d68cab;
      --accent-deep: #be6f91;
      --safe-top: max(env(safe-area-inset-top), 12px);
      --safe-bottom: max(env(safe-area-inset-bottom), 12px);
      --page-pad-x: clamp(22px, 6vw, 58px);
      --page-pad-y: clamp(22px, 5vw, 44px);
      --nav-size: 26px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.92), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(255,255,255,0.7), transparent 24%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.45), transparent 34%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 48%, var(--bg-3));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(24px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.2;
      animation: breathe 9s ease-in-out infinite;
    }

    body::before {
      width: 34vmax;
      height: 34vmax;
      top: -9vmax;
      right: -8vmax;
      background: rgba(255, 214, 231, 0.9);
    }

    body::after {
      width: 38vmax;
      height: 38vmax;
      bottom: -12vmax;
      left: -12vmax;
      background: rgba(248, 197, 218, 0.72);
      animation-delay: -4.5s;
    }

    @keyframes breathe {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.06); }
    }

    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border: none;
      background: transparent;
      color: rgba(190, 111, 145, 0.9);
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 30;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.22s ease, opacity 0.22s ease, color 0.22s ease;
      text-shadow: 0 4px 18px rgba(214, 140, 171, 0.35);
    }

    .nav-btn:hover {
      transform: translateY(-50%) scale(1.08);
      color: rgba(190, 111, 145, 1);
    }

    .nav-btn:active {
      transform: translateY(-50%) scale(0.95);
    }

    .nav-btn:disabled {
      opacity: 0.24;
      cursor: not-allowed;
    }

    .nav-btn.left { left: max(10px, env(safe-area-inset-left)); }
    .nav-btn.right { right: max(10px, env(safe-area-inset-right)); }

    .nav-btn svg {
      width: var(--nav-size);
      height: var(--nav-size);
      stroke-width: 2.15;
      fill: none;
      overflow: visible;
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100dvh;
      padding: calc(var(--page-pad-y) + var(--safe-top)) var(--page-pad-x) calc(var(--page-pad-y) + var(--safe-bottom));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stage-shell {
      position: relative;
      width: min(1080px, 100%);
      min-height: min(82dvh, 780px);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .page {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px) scale(0.992);
      transition: opacity 0.55s ease, transform 0.55s ease;
      padding: 4vh 1vw;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .message-stage {
      position: relative;
      width: min(860px, 100%);
      min-height: clamp(360px, 68vh, 620px);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 16px;
    }

    .poem-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      gap: clamp(14px, 2.5vh, 22px);
      min-height: 220px;
    }

    .poem-line {
      position: relative;
      display: block;
      width: fit-content;
      max-width: 100%;
      font-size: clamp(28px, 4.3vw, 52px);
      line-height: 1.52;
      letter-spacing: 0.02em;
      color: rgba(123, 91, 105, 0.96);
      text-wrap: pretty;
      filter: drop-shadow(0 8px 26px rgba(214, 140, 171, 0.08));
      transform-origin: left center;
      animation: lineRise 0.9s cubic-bezier(.19,.86,.25,1) both;
    }

    .poem-line.indent-0 { margin-left: 0; }
    .poem-line.indent-1 { margin-left: clamp(16px, 5vw, 64px); }
    .poem-line.indent-2 { margin-left: clamp(30px, 9vw, 118px); }
    .poem-line.indent-3 { margin-left: clamp(18px, 7vw, 86px); }

    @keyframes lineRise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(10px) rotate(var(--r, 0deg)) scale(0.98);
      filter: blur(4px);
      transform-origin: center;
      animation: charBloom 0.68s cubic-bezier(.18,.84,.26,1) forwards;
      will-change: transform, opacity, filter;
    }

    @keyframes charBloom {
      to {
        opacity: 1;
        transform: translateY(0) rotate(var(--r, 0deg)) scale(1);
        filter: blur(0);
      }
    }

    .char.fade-out {
      animation: charDissolve 1.05s cubic-bezier(.17,.86,.33,1) forwards;
      animation-delay: var(--delay, 0ms);
    }

    @keyframes charDissolve {
      to {
        opacity: 0;
        transform:
          translate(var(--dx, 0px), var(--dy, 0px))
          rotate(calc(var(--r, 0deg) + var(--spin, 0deg)))
          scale(var(--s, 0.72));
        filter: blur(7px);
      }
    }

    .choice-wrap {
      width: min(440px, 100%);
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: clamp(24px, 4vh, 34px);
      opacity: 0;
      transform: translateY(18px);
      pointer-events: none;
      transition: opacity 0.52s ease, transform 0.52s ease;
      align-self: center;
    }

    .choice-wrap.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .choice-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      min-height: 52px;
      padding: 14px 18px;
      font-size: clamp(16px, 2.1vw, 18px);
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn.primary {
      background: linear-gradient(135deg, #e8a7c1, #d78baa);
      color: #fff;
      box-shadow: 0 12px 28px rgba(215, 139, 170, 0.28);
    }

    .choice-btn.secondary {
      background: rgba(255, 255, 255, 0.72);
      color: #886977;
      box-shadow: 0 8px 22px rgba(160, 110, 132, 0.1);
      border: 1px solid rgba(214, 140, 171, 0.12);
    }

    .choice-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(215, 139, 170, 0.24);
    }

    .choice-btn:active {
      transform: scale(0.97);
    }

    .status-text {
      min-height: 24px;
      margin-top: 12px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      color: var(--text-soft);
      align-self: center;
    }

    .petal {
      position: absolute;
      width: 14px;
      height: 22px;
      border-radius: 70% 70% 70% 12%;
      background: linear-gradient(180deg, rgba(255, 217, 230, 0.66), rgba(230, 155, 185, 0.34));
      filter: blur(0.2px);
      transform: rotate(var(--rot, 0deg));
      opacity: 0;
      pointer-events: none;
      animation: petalFloat linear forwards;
      z-index: 0;
    }

    @keyframes petalFloat {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) rotate(var(--rot, 0deg)) scale(0.82);
      }
      12% { opacity: 0.9; }
      100% {
        opacity: 0;
        transform: translate3d(var(--drift-x, 0px), var(--drift-y, 240px), 0) rotate(calc(var(--rot, 0deg) + 90deg)) scale(1.18);
      }
    }

    @media (max-width: 760px) {
      :root { --nav-size: 24px; }

      .nav-btn.left { left: max(4px, env(safe-area-inset-left)); }
      .nav-btn.right { right: max(4px, env(safe-area-inset-right)); }

      .stage-shell {
        min-height: 86dvh;
      }

      .message-stage {
        min-height: clamp(420px, 74vh, 700px);
        justify-content: center;
      }

      .poem-wrap {
        min-height: 180px;
      }

      .poem-line {
        font-size: clamp(24px, 7vw, 34px);
        line-height: 1.62;
        max-width: calc(100% - 8px);
      }

      .poem-line.indent-1 { margin-left: clamp(12px, 5vw, 28px); }
      .poem-line.indent-2 { margin-left: clamp(20px, 9vw, 48px); }
      .poem-line.indent-3 { margin-left: clamp(14px, 7vw, 38px); }

      .choice-wrap {
        width: min(320px, 100%);
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 26px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <button class="nav-btn left" id="prevBtn" aria-label="上一页">
    <svg viewBox="0 0 24 24" stroke="currentColor">
      <path d="M15 18L9 12L15 6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <button class="nav-btn right" id="nextBtn" aria-label="下一页">
    <svg viewBox="0 0 24 24" stroke="currentColor">
      <path d="M9 18L15 12L9 6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="app">
    <main class="stage-shell" id="stageShell"></main>
  </div>

  <script>
    /**
     * GitHub Pages 版本说明：
     * 1. 这是前端页面，能直接部署到 GitHub Pages。
     * 2. 按钮结果通知必须调用你自己的外部接口。
     * 3. 请把 NOTIFY_ENDPOINT 换成 Cloudflare Worker / Vercel Function 地址。
     * 4. 不要把 webhook/token 等敏感信息直接写到这个前端文件里。
     */

    const CONFIG = {
      autoPlay: true,
      autoAdvanceDelay: 860,
      lineHoldMs: 980,
      dissolveMs: 1060,
      lineAppearGap: 240,
      petalIntervalMs: 1500,
      NOTIFY_ENDPOINT: "https://your-worker-or-function.example.com/notify",
      pageData: [
        {
          lines: [
            "今天的风很轻，我第一个想到的人是你。",
            "像晚霞落进云里那样，温柔又安静。",
            "所以我悄悄做了这个小页面，想让你看到。"
          ]
        },
        {
          lines: [
            "不是突然心动，是很多个瞬间慢慢叠在一起。",
            "是看到有趣的东西，会下意识想分享给你。",
            "也是每次聊天结束后，都会偷偷期待下一次。"
          ]
        },
        {
          lines: [
            "你像一束不喧哗的光。",
            "不必特别耀眼，也已经让周围的一切柔软下来。",
            "很多平常的日子，因为想到你，就开始有了亮度。"
          ]
        },
        {
          lines: [
            "所以我想认真地问你一次。",
            "接下来的日子，我想和你分享更多傍晚、晚风和小确幸。",
            "如果可以，我希望站到离你更近一点的位置。"
          ]
        },
        {
          lines: [
            "不用急着回答，我只是想把真心认真地交给你。",
            "可如果此刻刚好有答案，我会很开心地收下。",
            "你愿意，和我一起继续往前走吗？"
          ],
          isFinal: true
        }
      ]
    };

    const state = {
      currentPage: 0,
      pageToken: 0,
      petalTimer: null,
      lastChoice: null
    };

    const stageShell = document.getElementById("stageShell");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', '&quot;')
        .replaceAll("'", "&#39;");
    }

    function updateNavState() {
      prevBtn.disabled = state.currentPage === 0;
      nextBtn.disabled = state.currentPage === CONFIG.pageData.length - 1;
    }

    function buildPages() {
      stageShell.innerHTML = "";
      CONFIG.pageData.forEach((page, index) => {
        const pageEl = document.createElement("section");
        pageEl.className = `page ${index === state.currentPage ? "active" : ""}`;
        pageEl.dataset.index = String(index);

        const linesHtml = (page.lines || [])
          .map((_, i) => `<div class="poem-line indent-${i % 4}" data-line-index="${i}"></div>`)
          .join("");

        pageEl.innerHTML = `
          <div class="message-stage">
            <div class="poem-wrap" data-poem-wrap>${linesHtml}</div>
            ${page.isFinal ? `
              <div class="choice-wrap" data-choice-wrap>
                <button class="choice-btn primary" data-choice="愿意">愿意</button>
                <button class="choice-btn secondary" data-choice="不愿意">不愿意</button>
              </div>
              <div class="status-text" data-status></div>
            ` : ""}
          </div>
        `;

        stageShell.appendChild(pageEl);
      });
    }

    function getPageEl(index = state.currentPage) {
      return stageShell.querySelector(`.page[data-index="${index}"]`);
    }

    function setActivePage(index) {
      stageShell.querySelectorAll(".page").forEach((pageEl, idx) => {
        pageEl.classList.toggle("active", idx === index);
      });
      updateNavState();
    }

    function createCharSpan(char) {
      const span = document.createElement("span");
      span.className = "char";
      span.textContent = char;
      const rot = randomBetween(-8, 8).toFixed(2);
      span.style.setProperty("--r", `${rot}deg`);
      span.style.animationDelay = `${randomBetween(40, 320)}ms`;
      return span;
    }

    async function showLine(lineEl, text, token) {
      if (!lineEl || token !== state.pageToken) return;
      lineEl.innerHTML = "";
      const chars = [...text];
      chars.forEach((char) => {
        const span = createCharSpan(char);
        lineEl.appendChild(span);
      });
      await wait(680 + chars.length * 36);
    }

    async function dissolveLine(lineEl, token) {
      if (!lineEl || token !== state.pageToken) return;
      const chars = [...lineEl.querySelectorAll(".char")];
      chars.forEach((char, idx) => {
        char.style.setProperty("--dx", `${randomBetween(-34, 34)}px`);
        char.style.setProperty("--dy", `${randomBetween(-20, 32)}px`);
        char.style.setProperty("--spin", `${randomBetween(-28, 28)}deg`);
        char.style.setProperty("--s", `${randomBetween(0.58, 1.24)}`);
        char.style.setProperty("--delay", `${idx * 9}ms`);
        char.classList.add("fade-out");
      });
      await wait(CONFIG.dissolveMs + chars.length * 10);
      if (lineEl.isConnected) lineEl.innerHTML = "";
    }

    async function playPage(index) {
      const token = ++state.pageToken;
      const page = CONFIG.pageData[index];
      const pageEl = getPageEl(index);
      if (!pageEl) return;

      const lineEls = [...pageEl.querySelectorAll(".poem-line")];
      lineEls.forEach(el => el.innerHTML = "");
      const choiceWrap = pageEl.querySelector("[data-choice-wrap]");
      const statusEl = pageEl.querySelector("[data-status]");
      if (choiceWrap) choiceWrap.classList.remove("show");
      if (statusEl) statusEl.textContent = "";

      for (let i = 0; i < (page.lines || []).length; i++) {
        if (token !== state.pageToken) return;
        await showLine(lineEls[i], page.lines[i], token);
        if (token !== state.pageToken) return;
        if (i < page.lines.length - 1) {
          await wait(CONFIG.lineAppearGap);
        }
      }

      if (token !== state.pageToken) return;
      await wait(CONFIG.lineHoldMs);

      if (page.isFinal) {
        if (choiceWrap) choiceWrap.classList.add("show");
        return;
      }

      for (let i = 0; i < lineEls.length; i++) {
        if (token !== state.pageToken) return;
        await dissolveLine(lineEls[i], token);
      }

      await wait(CONFIG.autoAdvanceDelay);
      if (CONFIG.autoPlay && token === state.pageToken && state.currentPage < CONFIG.pageData.length - 1) {
        goToPage(state.currentPage + 1, { manual: false });
      }
    }

    function goToPage(index, options = { manual: true }) {
      state.currentPage = Math.max(0, Math.min(CONFIG.pageData.length - 1, index));
      state.pageToken += 1;
      setActivePage(state.currentPage);
      playPage(state.currentPage);
    }

    async function notifyChoice(choice) {
      const pageEl = getPageEl(state.currentPage);
      const statusEl = pageEl?.querySelector("[data-status]");
      if (!statusEl) return;

      statusEl.textContent = "正在把你的答案送出去…";

      if (!CONFIG.NOTIFY_ENDPOINT || CONFIG.NOTIFY_ENDPOINT.includes("your-worker-or-function.example.com")) {
        statusEl.textContent = `你点击了“${choice}”。当前还没填通知接口地址，所以暂时只在页面里记录结果。`;
        console.log("[Choice captured locally]", choice);
        state.lastChoice = choice;
        return;
      }

      try {
        const payload = {
          choice,
          pageTitle: document.title,
          time: new Date().toISOString(),
          userAgent: navigator.userAgent,
          lang: navigator.language || "unknown",
          screen: `${window.screen.width}x${window.screen.height}`,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown"
        };

        const response = await fetch(CONFIG.NOTIFY_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        statusEl.textContent = `已收到，你的选择是“${choice}”。`;
        state.lastChoice = choice;
      } catch (error) {
        console.error(error);
        statusEl.textContent = `选择已记录为“${choice}”，但通知发送失败了。请检查外部接口是否可用。`;
        state.lastChoice = choice;
      }
    }

    function spawnPetal() {
      const petal = document.createElement("span");
      petal.className = "petal";
      petal.style.left = `${randomBetween(6, 94)}%`;
      petal.style.top = `${randomBetween(-10, 24)}%`;
      petal.style.setProperty("--rot", `${randomBetween(-30, 30)}deg`);
      petal.style.setProperty("--drift-x", `${randomBetween(-80, 80)}px`);
      petal.style.setProperty("--drift-y", `${randomBetween(240, 420)}px`);
      petal.style.animationDuration = `${randomBetween(5.6, 8.2)}s`;
      stageShell.appendChild(petal);
      petal.addEventListener("animationend", () => petal.remove(), { once: true });
    }

    function startPetals() {
      stopPetals();
      spawnPetal();
      state.petalTimer = setInterval(spawnPetal, CONFIG.petalIntervalMs);
    }

    function stopPetals() {
      if (state.petalTimer) {
        clearInterval(state.petalTimer);
        state.petalTimer = null;
      }
      stageShell.querySelectorAll(".petal").forEach(el => el.remove());
    }

    function bindEvents() {
      prevBtn.addEventListener("click", () => {
        if (state.currentPage > 0) goToPage(state.currentPage - 1, { manual: true });
      });

      nextBtn.addEventListener("click", () => {
        if (state.currentPage < CONFIG.pageData.length - 1) goToPage(state.currentPage + 1, { manual: true });
      });

      stageShell.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-choice]");
        if (!btn) return;
        notifyChoice(btn.getAttribute("data-choice"));
      });

      let touchStartX = 0;
      let touchStartY = 0;

      stageShell.addEventListener("touchstart", (e) => {
        const touch = e.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      stageShell.addEventListener("touchend", (e) => {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        if (Math.abs(dx) < 44 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0 && state.currentPage < CONFIG.pageData.length - 1) {
          goToPage(state.currentPage + 1, { manual: true });
        } else if (dx > 0 && state.currentPage > 0) {
          goToPage(state.currentPage - 1, { manual: true });
        }
      }, { passive: true });

      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && state.currentPage > 0) goToPage(state.currentPage - 1, { manual: true });
        if (e.key === "ArrowRight" && state.currentPage < CONFIG.pageData.length - 1) goToPage(state.currentPage + 1, { manual: true });
      });
    }

    function init() {
      buildPages();
      bindEvents();
      startPetals();
      updateNavState();
      goToPage(0, { manual: false });
    }

    init();
  </script>
</body>
</html>
