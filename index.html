<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>给你的温柔小页面</title>
  <style>
    :root {
      --bg-1: #fff7fb;
      --bg-2: #fef0f6;
      --bg-3: #fde7f0;
      --card: rgba(255, 255, 255, 0.45);
      --text: #6a4d5c;
      --text-soft: #9b7a89;
      --primary: #d98cab;
      --primary-deep: #c46f93;
      --border: rgba(217, 140, 171, 0.18);
      --shadow: 0 18px 60px rgba(195, 126, 157, 0.18);
      --radius: 28px;
      --duration-line: 2200ms;
      --duration-hold: 900ms;
      --duration-fade: 1100ms;
      --nav-size: 42px;
      --safe-top: max(env(safe-area-inset-top), 12px);
      --safe-bottom: max(env(safe-area-inset-bottom), 12px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.95), transparent 32%),
        radial-gradient(circle at 85% 18%, rgba(255,255,255,0.72), transparent 28%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.55), transparent 34%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 38vmax;
      height: 38vmax;
      border-radius: 50%;
      filter: blur(24px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
      animation: breathe 8s ease-in-out infinite;
    }

    body::before {
      top: -10vmax;
      right: -8vmax;
      background: #ffd8e7;
    }

    body::after {
      bottom: -12vmax;
      left: -12vmax;
      background: #f8c7da;
      animation-delay: -4s;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.08) translateY(-10px); }
    }

    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(24px + var(--safe-top)) 18px calc(24px + var(--safe-bottom));
    }

    .nav-btn {
      position: fixed;
      top: calc(14px + var(--safe-top));
      width: var(--nav-size);
      height: var(--nav-size);
      border: 1px solid rgba(255,255,255,0.55);
      background: rgba(255,255,255,0.46);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 999px;
      box-shadow: 0 12px 30px rgba(201, 131, 162, 0.16);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.25s ease, background 0.25s ease, opacity 0.25s ease;
      color: var(--primary-deep);
      z-index: 30;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-btn:hover { transform: translateY(-1px) scale(1.03); }
    .nav-btn:active { transform: scale(0.96); }
    .nav-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .nav-btn.left { left: 14px; }
    .nav-btn.right { right: 14px; }

    .nav-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 2.4;
    }

    .frame {
      width: min(920px, 100%);
      min-height: min(78dvh, 720px);
      border-radius: calc(var(--radius) + 6px);
      border: 1px solid rgba(255,255,255,0.55);
      background: linear-gradient(180deg, rgba(255,255,255,0.42), rgba(255,255,255,0.22));
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(24px, 5vw, 48px);
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.28), transparent 30%),
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.35), transparent 40%);
      pointer-events: none;
    }

    .page-indicator {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 6;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(217, 140, 171, 0.28);
      transition: transform 0.3s ease, background 0.3s ease, width 0.3s ease;
    }

    .dot.active {
      width: 22px;
      background: rgba(217, 140, 171, 0.92);
    }

    .page {
      position: absolute;
      inset: 0;
      padding: clamp(32px, 5vw, 56px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(0.99);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .page-kicker {
      margin: 0 0 10px;
      font-size: clamp(12px, 2vw, 14px);
      letter-spacing: 0.25em;
      color: var(--text-soft);
      text-transform: uppercase;
    }

    .page-title {
      margin: 0 0 22px;
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 600;
      line-height: 1.18;
      color: #7a5968;
      text-wrap: balance;
    }

    .message-stage {
      position: relative;
      width: min(680px, 100%);
      min-height: clamp(200px, 34vh, 320px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .message-line {
      position: relative;
      max-width: min(560px, 100%);
      padding: 14px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.56);
      border: 1px solid rgba(255,255,255,0.75);
      color: var(--text);
      box-shadow: 0 10px 30px rgba(200, 130, 163, 0.12);
      font-size: clamp(18px, 2.4vw, 24px);
      line-height: 1.8;
      letter-spacing: 0.02em;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      overflow: visible;
      transform-origin: center;
      animation: softIn 0.72s cubic-bezier(.2,.8,.2,1) both;
    }

    @keyframes softIn {
      from { opacity: 0; transform: translateY(18px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message-line.typing::after {
      content: "";
      display: inline-block;
      width: 0.55em;
      height: 1.1em;
      margin-left: 0.14em;
      vertical-align: -0.12em;
      border-radius: 2px;
      background: rgba(196, 111, 147, 0.55);
      animation: blink 0.9s steps(1, end) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .char {
      display: inline-block;
      opacity: 0;
      transform: translateY(6px) scale(0.96);
      filter: blur(2px);
      animation: charIn 420ms ease forwards;
      will-change: transform, opacity, filter;
    }

    @keyframes charIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .char.fade-out {
      animation: dissolve 1s cubic-bezier(.16,.84,.32,1) forwards;
    }

    @keyframes dissolve {
      to {
        opacity: 0;
        transform:
          translate(var(--dx, 0px), var(--dy, 0px))
          rotate(var(--rot, 0deg))
          scale(var(--scale, 0.72));
        filter: blur(7px);
      }
    }

    .page-note {
      margin-top: 16px;
      font-size: clamp(13px, 1.8vw, 15px);
      color: var(--text-soft);
      opacity: 0.9;
    }

    .heart {
      position: absolute;
      width: 16px;
      height: 16px;
      background: rgba(240, 147, 183, 0.22);
      transform: rotate(45deg);
      border-radius: 3px;
      animation: floatUp linear forwards;
      pointer-events: none;
      z-index: 1;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before { left: -50%; }
    .heart::after { top: -50%; }

    @keyframes floatUp {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.6) rotate(45deg);
      }
      12% { opacity: 1; }
      to {
        opacity: 0;
        transform: translateY(-220px) translateX(var(--drift, 0px)) scale(1.2) rotate(45deg);
      }
    }

    .final-card {
      width: min(580px, 100%);
      padding: clamp(22px, 4vw, 34px);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(255,255,255,0.8);
      box-shadow: 0 14px 40px rgba(197, 125, 156, 0.16);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      opacity: 0;
      transform: translateY(16px) scale(0.97);
      pointer-events: none;
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .final-card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .final-title {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 44px);
      color: #7b5969;
      line-height: 1.2;
    }

    .final-desc {
      margin: 0 0 22px;
      font-size: clamp(16px, 2.4vw, 20px);
      line-height: 1.8;
      color: var(--text);
    }

    .choice-group {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      width: 100%;
    }

    .choice-btn {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 14px 18px;
      font-size: 17px;
      font-weight: 600;
      transition: transform 0.24s ease, box-shadow 0.24s ease, opacity 0.24s ease, background 0.24s ease;
      min-height: 50px;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:active { transform: scale(0.97); }

    .choice-btn.primary {
      background: linear-gradient(135deg, #e7a6c0, #d98cab);
      color: white;
      box-shadow: 0 12px 28px rgba(217, 140, 171, 0.32);
    }

    .choice-btn.secondary {
      background: rgba(255,255,255,0.8);
      color: #8a6978;
      border: 1px solid rgba(217, 140, 171, 0.18);
    }

    .choice-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(217, 140, 171, 0.22);
    }

    .status-text {
      min-height: 26px;
      margin-top: 14px;
      font-size: 14px;
      color: var(--text-soft);
    }

    .footer-tip {
      position: absolute;
      top: calc(18px + var(--safe-top));
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.6);
      color: var(--text-soft);
      font-size: 12px;
      letter-spacing: 0.06em;
      z-index: 10;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    @media (max-width: 700px) {
      :root { --nav-size: 38px; }

      .frame {
        min-height: 82dvh;
        padding: 18px;
        border-radius: 24px;
      }

      .page {
        padding: 74px 18px 54px;
      }

      .message-stage {
        min-height: 270px;
      }

      .message-line {
        padding: 14px 16px;
        border-radius: 18px;
      }

      .choice-group {
        grid-template-columns: 1fr;
      }

      .footer-tip {
        font-size: 11px;
        top: calc(14px + var(--safe-top));
        max-width: calc(100% - 120px);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <button class="nav-btn left" id="prevBtn" aria-label="上一页">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M15 18L9 12L15 6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <button class="nav-btn right" id="nextBtn" aria-label="下一页">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M9 18L15 12L9 6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="app">
    <main class="frame" id="frame">
      <div class="footer-tip">轻触箭头可切换，也会自动播放</div>
      <div class="page-indicator" id="pageIndicator"></div>
    </main>
  </div>

  <script>
    /**
     * ===============================
     * 使用说明（部署到 GitHub Pages 前请先看）
     * ===============================
     * 1. 这是一个可直接部署到 GitHub Pages 的单文件页面。
     * 2. 通知功能不能只靠 GitHub Pages 本身完成，必须请求一个外部接口。
     * 3. 请把 NOTIFY_ENDPOINT 替换成你自己的 Cloudflare Worker / Vercel Function 地址。
     * 4. 不要把真实的 Discord/Telegram/邮箱密钥直接写在这个前端文件里。
     */

    const CONFIG = {
      autoPlay: true,
      autoAdvanceDelay: 900,
      typingBaseDelay: 56,
      typingJitter: 18,
      lineHoldMs: 820,
      dissolveMs: 980,
      heartIntervalMs: 1400,
      NOTIFY_ENDPOINT: "https://your-worker-or-function.example.com/notify",
      pageData: [
        {
          kicker: "Page 01",
          title: "有些话，想慢一点讲给你听",
          note: "这一页和后面的文案，你都可以自由替换。",
          lines: [
            "今天的风很轻，我第一个想到的人是你。",
            "像晚霞落进云里那样，温柔又安静。",
            "所以我悄悄做了这个小页面，想让你看到。"
          ]
        },
        {
          kicker: "Page 02",
          title: "不是突然心动，是很多个瞬间叠在一起",
          note: "文字会逐句出现，再像消息一样轻轻消散。",
          lines: [
            "是看到有趣的东西，会下意识想分享给你。",
            "是开心的时候想告诉你，失落的时候也想起你。",
            "也是每一次聊天结束后，都会偷偷期待下一次。"
          ]
        },
        {
          kicker: "Page 03",
          title: "你像一束不喧哗的光",
          note: "风格目前是温柔浪漫，你后续还能继续改颜色和文案。",
          lines: [
            "不必特别耀眼，也已经让周围的一切变得柔软。",
            "很多平常的日子，因为想到你，就开始有了亮度。",
            "连时间都像被放慢了一点点。"
          ]
        },
        {
          kicker: "Page 04",
          title: "所以我想认真地问你一次",
          note: "这里也可以改成你们之间更私人的回忆。",
          lines: [
            "接下来的日子，我想和你分享更多傍晚、晚风和小确幸。",
            "想把偏爱说得清楚，把在意落到细节里。",
            "如果可以，我希望站到离你更近一点的位置。"
          ]
        },
        {
          kicker: "Page 05",
          title: "你愿意，和我一起继续往前走吗？",
          note: "点击按钮后，页面会调用你的通知接口，把结果发给你。",
          lines: [
            "不用急着回答，我只是想把真心认真地交给你。",
            "可如果现在刚好有答案，我会很开心地收下。"
          ],
          isFinal: true
        }
      ]
    };

    const state = {
      currentPage: 0,
      isAnimating: false,
      pageToken: 0,
      heartTimer: null,
      lastChoice: null
    };

    const frame = document.getElementById("frame");
    const pageIndicator = document.getElementById("pageIndicator");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    function createPageIndicator() {
      pageIndicator.innerHTML = "";
      CONFIG.pageData.forEach((_, idx) => {
        const dot = document.createElement("span");
        dot.className = `dot ${idx === state.currentPage ? "active" : ""}`;
        pageIndicator.appendChild(dot);
      });
    }

    function updatePageIndicator() {
      [...pageIndicator.children].forEach((dot, idx) => {
        dot.classList.toggle("active", idx === state.currentPage);
      });
    }

    function escapeHTML(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', '&quot;')
        .replaceAll("'", "&#39;");
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function spawnHeart() {
      const heart = document.createElement("span");
      heart.className = "heart";
      heart.style.left = `${randomBetween(10, 90)}%`;
      heart.style.bottom = `${randomBetween(6, 18)}%`;
      heart.style.setProperty("--drift", `${randomBetween(-30, 30)}px`);
      heart.style.animationDuration = `${randomBetween(4.6, 7.2)}s`;
      heart.style.opacity = `${randomBetween(0.5, 1)}`;
      heart.style.scale = `${randomBetween(0.85, 1.2)}`;
      frame.appendChild(heart);
      heart.addEventListener("animationend", () => heart.remove(), { once: true });
    }

    function startHeartStream() {
      stopHeartStream();
      spawnHeart();
      state.heartTimer = setInterval(spawnHeart, CONFIG.heartIntervalMs);
    }

    function stopHeartStream() {
      if (state.heartTimer) {
        clearInterval(state.heartTimer);
        state.heartTimer = null;
      }
      frame.querySelectorAll(".heart").forEach(el => el.remove());
    }

    function makePage(page, index) {
      const pageEl = document.createElement("section");
      pageEl.className = `page ${index === state.currentPage ? "active" : ""}`;
      pageEl.dataset.pageIndex = String(index);

      pageEl.innerHTML = `
        <p class="page-kicker">${escapeHTML(page.kicker || "")}</p>
        <h1 class="page-title">${escapeHTML(page.title || "")}</h1>
        <div class="message-stage" data-stage></div>
        <p class="page-note">${escapeHTML(page.note || "")}</p>
      `;

      if (page.isFinal) {
        const finalCard = document.createElement("div");
        finalCard.className = "final-card";
        finalCard.innerHTML = `
          <h2 class="final-title">我的答案，想听你的</h2>
          <p class="final-desc">如果你愿意，我会把这份认真继续下去；如果你暂时不愿意，我也会尊重并珍惜这次表达。</p>
          <div class="choice-group">
            <button class="choice-btn primary" data-choice="愿意">愿意</button>
            <button class="choice-btn secondary" data-choice="不愿意">不愿意</button>
          </div>
          <div class="status-text" data-status></div>
        `;
        pageEl.appendChild(finalCard);
      }

      return pageEl;
    }

    function renderPages() {
      frame.querySelectorAll(".page").forEach(el => el.remove());
      CONFIG.pageData.forEach((page, index) => frame.appendChild(makePage(page, index)));
      createPageIndicator();
      updateNavState();
    }

    function getPageEl(index = state.currentPage) {
      return frame.querySelector(`.page[data-page-index="${index}"]`);
    }

    function updateNavState() {
      prevBtn.disabled = state.currentPage === 0;
      nextBtn.disabled = state.currentPage === CONFIG.pageData.length - 1;
    }

    async function typeLine(lineText, container, token) {
      const line = document.createElement("div");
      line.className = "message-line typing";
      container.appendChild(line);

      const chars = [...lineText];
      for (let i = 0; i < chars.length; i++) {
        if (token !== state.pageToken) return null;
        const span = document.createElement("span");
        span.className = "char";
        span.style.animationDelay = `${Math.min(i * 10, 200)}ms`;
        span.textContent = chars[i];
        line.appendChild(span);
        const delay = CONFIG.typingBaseDelay + randomBetween(0, CONFIG.typingJitter);
        await wait(delay);
      }

      line.classList.remove("typing");
      return line;
    }

    async function dissolveLine(line, token) {
      if (!line || token !== state.pageToken) return;
      const chars = [...line.querySelectorAll(".char")];
      chars.forEach((char, idx) => {
        char.style.setProperty("--dx", `${randomBetween(-30, 30)}px`);
        char.style.setProperty("--dy", `${randomBetween(-24, 26)}px`);
        char.style.setProperty("--rot", `${randomBetween(-22, 22)}deg`);
        char.style.setProperty("--scale", `${randomBetween(0.55, 1.25)}`);
        char.style.animationDelay = `${idx * 7}ms`;
        char.classList.add("fade-out");
      });
      await wait(CONFIG.dissolveMs);
      if (line.isConnected) line.remove();
    }

    async function playPage(index) {
      const page = CONFIG.pageData[index];
      const pageEl = getPageEl(index);
      if (!pageEl) return;

      const token = ++state.pageToken;
      state.isAnimating = true;
      updateNavState();

      const stage = pageEl.querySelector("[data-stage]");
      stage.innerHTML = "";
      pageEl.querySelectorAll(".final-card").forEach(card => card.classList.remove("show"));

      for (const lineText of page.lines || []) {
        if (token !== state.pageToken) return;
        const line = await typeLine(lineText, stage, token);
        if (token !== state.pageToken || !line) return;
        await wait(CONFIG.lineHoldMs);
        await dissolveLine(line, token);
        await wait(120);
      }

      if (token !== state.pageToken) return;

      if (page.isFinal) {
        const finalCard = pageEl.querySelector(".final-card");
        if (finalCard) {
          finalCard.classList.add("show");
        }
        state.isAnimating = false;
        updateNavState();
        return;
      }

      state.isAnimating = false;
      updateNavState();

      if (CONFIG.autoPlay && index === state.currentPage) {
        await wait(CONFIG.autoAdvanceDelay);
        if (token === state.pageToken && state.currentPage < CONFIG.pageData.length - 1) {
          goToPage(state.currentPage + 1, { manual: false });
        }
      }
    }

    function setActivePage(index) {
      frame.querySelectorAll(".page").forEach((pageEl, idx) => {
        pageEl.classList.toggle("active", idx === index);
      });
      updatePageIndicator();
      updateNavState();
    }

    function goToPage(index, options = { manual: true }) {
      const safeIndex = Math.max(0, Math.min(CONFIG.pageData.length - 1, index));
      state.currentPage = safeIndex;
      state.pageToken += 1;
      setActivePage(safeIndex);
      playPage(safeIndex);
    }

    async function notifyChoice(choice) {
      const pageEl = getPageEl(state.currentPage);
      const statusEl = pageEl?.querySelector("[data-status]");
      if (!statusEl) return;

      statusEl.textContent = "正在认真告诉对方你的选择…";

      if (!CONFIG.NOTIFY_ENDPOINT || CONFIG.NOTIFY_ENDPOINT.includes("your-worker-or-function.example.com")) {
        statusEl.textContent = `你点击了“${choice}”。当前还没填通知接口地址，所以暂时只在页面里显示结果。`;
        console.log("[Choice captured locally]", choice);
        state.lastChoice = choice;
        return;
      }

      try {
        const payload = {
          choice,
          pageTitle: document.title,
          time: new Date().toISOString(),
          userAgent: navigator.userAgent,
          lang: navigator.language || "unknown",
          screen: `${window.screen.width}x${window.screen.height}`,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown"
        };

        const response = await fetch(CONFIG.NOTIFY_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        statusEl.textContent = `已收到，你的选择是“${choice}”。`;
        state.lastChoice = choice;
      } catch (error) {
        console.error(error);
        statusEl.textContent = `选择已记录为“${choice}”，但通知发送失败了。请检查外部接口是否可用。`;
        state.lastChoice = choice;
      }
    }

    function bindChoiceEvents() {
      frame.addEventListener("click", (event) => {
        const btn = event.target.closest("[data-choice]");
        if (!btn) return;
        const choice = btn.getAttribute("data-choice");
        notifyChoice(choice);
      });
    }

    function bindNavEvents() {
      prevBtn.addEventListener("click", () => {
        if (state.currentPage > 0) goToPage(state.currentPage - 1, { manual: true });
      });

      nextBtn.addEventListener("click", () => {
        if (state.currentPage < CONFIG.pageData.length - 1) goToPage(state.currentPage + 1, { manual: true });
      });

      let touchStartX = 0;
      let touchStartY = 0;

      frame.addEventListener("touchstart", (e) => {
        const touch = e.changedTouches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }, { passive: true });

      frame.addEventListener("touchend", (e) => {
        const touch = e.changedTouches[0];
        const dx = touch.clientX - touchStartX;
        const dy = touch.clientY - touchStartY;
        if (Math.abs(dx) < 46 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0 && state.currentPage < CONFIG.pageData.length - 1) {
          goToPage(state.currentPage + 1, { manual: true });
        } else if (dx > 0 && state.currentPage > 0) {
          goToPage(state.currentPage - 1, { manual: true });
        }
      }, { passive: true });

      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" && state.currentPage > 0) goToPage(state.currentPage - 1, { manual: true });
        if (e.key === "ArrowRight" && state.currentPage < CONFIG.pageData.length - 1) goToPage(state.currentPage + 1, { manual: true });
      });
    }

    function init() {
      renderPages();
      bindChoiceEvents();
      bindNavEvents();
      startHeartStream();
      goToPage(0, { manual: false });
    }

    init();
  </script>
</body>
</html>
